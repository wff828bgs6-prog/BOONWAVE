name: BOONWAVE Core Quality

on:
  push:
    branches:
      - codex/core-links-stage-ab
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: core-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install project metadata
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Check JavaScript syntax
        run: npm run check:syntax

      - name: Run core smoke tests
        run: npm test
