<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#050812">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BOONWAVE">
  <title>BOONWAVE</title>
  <style>
    html,body{margin:0;width:100%;height:100%;background:#050812;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",system-ui,sans-serif;overflow:hidden}
    body{display:grid;place-items:center;background:radial-gradient(circle at 50% 42%,rgba(66,93,210,.22),transparent 38%),#050812}
    .loader{text-align:center;opacity:.92}.mark{font-size:56px;line-height:1;color:#89a5ff;margin-bottom:18px}.loader b{font-size:22px;letter-spacing:.08em}.loader small{display:block;margin-top:10px;color:#93a0b8;font-size:13px}
  </style>
</head>
<body>
  <div class="loader"><div class="mark">≈</div><b>BOONWAVE</b><small>загрузка актуальной версии</small></div>
  <script>
    (async function(){
      var BUILD='daily-mvp-30-pwa-clean';
      var CLEAN_FLAG='boonwave_pwa_clean_initialized_v30';
      var isStandalone=Boolean(window.navigator.standalone)||window.matchMedia('(display-mode: standalone)').matches;
      try{
        if(isStandalone && localStorage.getItem(CLEAN_FLAG)!=='1'){
          ['boonwave_v6_session','boonwave_v6_data_visual-demo','boonwave_v6_guest_autobackup'].forEach(function(key){localStorage.removeItem(key)});
          localStorage.setItem(CLEAN_FLAG,'1');
        }
        if('caches' in window){
          var keys=await caches.keys();
          await Promise.all(keys.filter(function(key){return key.indexOf('boonwave-clean-')===0}).map(function(key){return caches.delete(key)}));
        }
      }catch(error){console.warn('PWA start cleanup skipped',error)}
      location.replace('./?v='+BUILD);
    })();
  </script>
</body>
</html>
