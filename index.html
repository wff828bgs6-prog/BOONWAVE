<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#090b12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>BOONWAVE V5.4.6</title>
  <link rel="manifest" href="manifest.webmanifest?v=5.4.6">
  <link rel="stylesheet" href="styles.css?v=5.4.6">
</head>
<body>
  <section id="splashScreen" class="splash-screen" aria-label="BOONWAVE">
    <div class="splash-noise"></div>
    <div class="splash-orbit orbit-a"></div>
    <div class="splash-orbit orbit-b"></div>
    <div class="splash-dots"></div>
    <div class="splash-content">
      <div class="splash-full-wrap"><img src="boonwave-approved-splash.png" alt="BOONWAVE" class="splash-full"></div>
      <p class="splash-tagline">Твоё пространство возможностей</p>
      <div class="splash-progress"><span></span></div>
    </div>
  </section>

  <section id="authScreen" class="auth-screen hidden">
    <div class="auth-glow glow-one"></div>
    <div class="auth-glow glow-two"></div>
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-mark-wrap"><img src="boonwave-approved-splash.png" alt="BOONWAVE" class="auth-mark"></div>
        <p class="auth-slogan">Твоё пространство возможностей</p>
      </div>
      <div class="auth-tabs" role="tablist">
        <button type="button" class="active" data-auth-tab="login">Вход</button>
        <button type="button" data-auth-tab="register">Регистрация</button>
      </div>
      <form id="loginForm" class="auth-form">
        <label>Email<input name="email" type="email" autocomplete="email" placeholder="name@example.com" required></label>
        <label>Пароль<input name="password" type="password" autocomplete="current-password" placeholder="••••••••" minlength="4" required></label>
        <button class="primary auth-submit" type="submit">Войти</button>
      </form>
      <form id="registerForm" class="auth-form hidden">
        <label>Имя<input name="name" type="text" autocomplete="name" placeholder="Ваше имя" required></label>
        <label>Email<input name="email" type="email" autocomplete="email" placeholder="name@example.com" required></label>
        <label>Пароль<input name="password" type="password" autocomplete="new-password" placeholder="Минимум 4 символа" minlength="4" required></label>
        <button class="primary auth-submit" type="submit">Создать аккаунт</button>
      </form>
      <button id="skipAuth" class="skip-auth" type="button">Визуальное знакомство</button>
    </div>
  </section>

  <main id="app" class="app hidden">
    <div class="app-bg-glow bg-left"></div>
    <div class="app-bg-glow bg-right"></div>

    <header class="workspace-topbar">
      <button id="brandMark" class="brand-mark-btn touchable" aria-label="BOONWAVE">
        <img src="boonwave-mark.png" alt="BOONWAVE">
      </button>
      <div class="space-switch" role="tablist" aria-label="Переключение пространства">
        <button class="touchable" data-space="personal">Личное</button>
        <button class="touchable active" data-space="work">Проекты</button>
      </div>
      <button id="settingsBtn" class="icon-button touchable" aria-label="Меню настроек"></button>
    </header>

    <section class="toolbar-strip">
      <button id="createRootBtn" class="toolbar-btn primary touchable"><span class="btn-icon" data-icon="18"></span><span>Корневой элемент</span></button>
      <button id="fitBtn" class="toolbar-btn touchable">Вписать</button>
      <button id="centerBtn" class="toolbar-btn touchable">В центр</button>
    </section>

    <section id="workspaceShell" class="workspace-shell">
      <canvas id="dotCanvas"></canvas>
      <svg id="linkLayer" class="link-layer"></svg>
      <div id="workspaceViewport">
        <div id="workspaceInner"></div>
      </div>
      <div id="emptyState" class="empty-state hidden">
        <div class="empty-mark">≈</div>
        <h2>Поле возможностей</h2>
        <p>Создайте корневой элемент — проект, цель, человека или идею.</p>
      </div>
      <div class="zoom-controls">
        <button class="touchable" id="zoomInBtn">+</button>
        <button class="touchable" id="zoomOutBtn">−</button>
      </div>
    </section>

    <nav class="bottom-nav">
      <button class="nav-btn touchable active" data-view="tree"><span class="nav-icon" data-icon="32"></span><small>Древо</small></button>
      <button class="nav-btn touchable" data-view="today"><span class="nav-icon" data-icon="9"></span><small>Сегодня</small></button>
      <button class="nav-btn touchable" data-view="results"><span class="nav-icon" data-icon="25"></span><small>Результаты</small></button>
      <button class="nav-btn touchable" data-view="archive"><span class="nav-icon" data-icon="4"></span><small>Архив</small></button>
    </nav>
  </main>

  <div id="sheetOverlay" class="sheet-overlay hidden"></div>

  <section id="sideSheet" class="sheet hidden">
    <div class="sheet-head">
      <div>
        <small id="sheetKicker"></small>
        <h2 id="sheetTitle">Панель</h2>
      </div>
      <button id="sheetClose" class="icon-button touchable" aria-label="Закрыть"></button>
    </div>
    <div id="sheetContent" class="sheet-content"></div>
  </section>

  <section id="modalOverlay" class="modal-overlay hidden"></section>

  <section id="editorModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <small id="editorKicker"></small>
          <h2 id="editorTitle">Карточка</h2>
        </div>
        <button id="editorClose" class="icon-button touchable" aria-label="Закрыть"></button>
      </div>
      <div id="editorBody" class="modal-body"></div>
      <div class="modal-actions">
        <button id="editorDelete" class="toolbar-btn danger touchable">Удалить</button>
        <button id="editorCancel" class="toolbar-btn touchable">Отмена</button>
        <button id="editorSave" class="toolbar-btn primary touchable">Сохранить</button>
      </div>
    </div>
  </section>

  <section id="createMenu" class="floating-menu hidden">
    <button class="menu-item touchable" data-create-type="project"><span class="menu-item-icon" data-icon="32"></span><span>Проект</span></button>
    <button class="menu-item touchable" data-create-type="goal"><span class="menu-item-icon" data-icon="21"></span><span>Цель</span></button>
    <button class="menu-item touchable" data-create-type="person"><span class="menu-item-icon" data-icon="7"></span><span>Человек</span></button>
    <button class="menu-item touchable" data-create-type="idea"><span class="menu-item-icon" data-icon="21"></span><span>Идея</span></button>
  </section>

  <section id="cardMenu" class="floating-menu hidden"></section>

  <section id="settingsMenu" class="floating-menu hidden settings-menu">
    <button class="menu-item touchable" data-settings-action="logout"><span class="menu-item-icon" data-icon="12"></span><span>Выйти</span></button>
    <button class="menu-item touchable danger" data-settings-action="reset"><span class="menu-item-icon" data-icon="13"></span><span>Полный сброс</span></button>
    <div class="menu-version">Версия v5.4.6</div>
  </section>

  <input id="imageInput" type="file" accept="image/*" hidden>

  <script src="app.js?v=5.4.6"></script>
</body>
</html>
