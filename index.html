<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#070913"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="BOONWAVE"><title>BOONWAVE</title><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icon-192.png"><link rel="stylesheet" href="styles/boonwave-tokens.css"><link rel="stylesheet" href="styles/production-shell.css"><link rel="stylesheet" href="styles/card-views.css"><link rel="stylesheet" href="styles/one-hand-rail.css"></head><body><svg width="0" height="0" aria-hidden="true" focusable="false"><defs><linearGradient id="bwIconGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#a14cff"/><stop offset="1" stop-color="#22bfff"/></linearGradient></defs></svg><main class="app-shell"><header class="app-header"><div class="app-badge"><strong>BOONWAVE</strong><span>Production Core</span></div></header><aside class="one-hand-rail" id="utilityRail" data-side="right" aria-label="Управление одной рукой, справа"><button class="rail-grip" id="railGrip" type="button" aria-label="Перенести панель на другую сторону"></button><button class="utility-button" id="homeSelfButton" type="button" aria-label="Вернуться к карточке Я Есмь"><svg class="bw-icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="3"/><path d="M6 19c.6-3.2 2.6-5 6-5s5.4 1.8 6 5"/><path d="M4 12a8 8 0 0 1 16 0"/></svg></button><button class="utility-button" id="cardLockButton" type="button" aria-label="Зафиксировать расположение карточек" aria-pressed="false"><svg class="bw-icon lock-closed" viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="3"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/><path d="M12 14v2"/></svg><svg class="bw-icon lock-open" viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="3"/><path d="M16 10V7a4 4 0 0 0-7.5-2"/><path d="M12 14v2"/></svg></button><button class="rail-button" id="redoButton" type="button" aria-label="Повторить действие" disabled><svg class="bw-icon" viewBox="0 0 24 24"><path d="M8 7h7a5 5 0 0 1 0 10H9"/><path d="m12 4-4 3 4 3"/></svg></button><div class="rail-zoom" id="zoomControl"><button class="zoom-step" id="zoomInButton" type="button" aria-label="Увеличить масштаб"><svg class="bw-icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button><div class="zoom-touch-area" id="zoomTouchArea"><div class="zoom-visual" aria-hidden="true"><div class="zoom-fill"></div><div class="zoom-thumb"></div></div><input id="zoomRange" class="zoom-accessible-range" type="range" min="0.14" max="1.5" step="0.005" value="0.85" aria-label="Масштаб рабочего пространства" aria-orientation="vertical"></div><button class="zoom-step" id="zoomOutButton" type="button" aria-label="Уменьшить масштаб"><svg class="bw-icon" viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button></div><button class="rail-button" id="undoButton" type="button" aria-label="Отменить действие" disabled><svg class="bw-icon" viewBox="0 0 24 24"><path d="M16 7H9a5 5 0 0 0 0 10h6"/><path d="m12 4 4 3-4 3"/></svg></button><button class="rail-button" id="addCardButton" type="button" aria-label="Создать карточку"><svg class="bw-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 8v8M8 12h8"/></svg></button><button class="rail-button" id="moreToolsButton" type="button" aria-label="Дополнительные действия" aria-expanded="false" aria-controls="toolsSheet"><svg class="bw-icon" viewBox="0 0 24 24"><circle cx="6" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="18" cy="12" r="1.4"/></svg></button></aside><section id="canvas" aria-label="Рабочее пространство BOONWAVE"><div id="world"></div></section><div class="status-live" id="hint" role="status" aria-live="polite">Выбери карточку</div></main><section class="tools-sheet" id="toolsSheet" hidden aria-hidden="true"><div class="tools-panel" role="dialog" aria-modal="true" aria-labelledby="toolsTitle"><div class="tools-head"><h2 id="toolsTitle">Дополнительные действия</h2><button class="tools-close" id="closeToolsButton" type="button" aria-label="Закрыть">×</button></div><div class="tools-grid"><button class="tools-action" id="linkButton" type="button" aria-label="Связать или отвязать карточки" aria-pressed="false" data-close-tools-after-action><span>Связь</span></button><button class="tools-action" id="deleteButton" type="button" aria-label="Переместить карточку в корзину" data-close-tools-after-action><span>В корзину</span></button><button class="tools-action" type="button" disabled><span>Люди</span></button><button class="tools-action" type="button" disabled><span>Архив</span></button></div></div></section><section class="sheet" id="createSheet" hidden><form class="sheet-panel" id="createCardForm"><div class="sheet-head"><h2>Новая карточка</h2><button class="close-button" id="closeSheetButton" type="button">×</button></div><div class="type-grid" id="typeGrid"><button class="type-button" type="button" data-node-type="project" aria-pressed="true">Проект</button><button class="type-button" type="button" data-node-type="process" aria-pressed="false">Процесс</button><button class="type-button" type="button" data-node-type="person" aria-pressed="false">Человек</button><button class="type-button" type="button" data-node-type="idea" aria-pressed="false">Идея</button><button class="type-button" type="button" data-node-type="goal" aria-pressed="false">Цель</button></div><label class="field"><span>Название</span><input id="cardTitle" name="title" maxlength="80" required></label><label class="field"><span>Описание</span><textarea id="cardDescription" name="description" maxlength="240"></textarea></label><div class="typed-fields" id="createTypeFields"></div><button class="submit-button" type="submit">Создать карточку</button></form></section><section class="sheet" id="editSheet" hidden><form class="sheet-panel" id="editCardForm"><div class="sheet-head"><h2>Редактирование</h2><button class="close-button" id="closeEditSheetButton" type="button">×</button></div><label class="field"><span>Название</span><input id="editCardTitle" maxlength="80" required></label><label class="field"><span>Описание</span><textarea id="editCardDescription" maxlength="240"></textarea></label><div class="typed-fields" id="editTypeFields"></div><button class="submit-button" type="submit">Сохранить изменения</button></form></section><script type="module" src="app.js"></script></body></html>
