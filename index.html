<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#0a0b0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
  <title>BOONWAVE</title>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <button class="brand" data-action="home">BOONWAVE</button>
      <div class="space-switch">
        <button data-space="personal">Личное</button>
        <button class="active" data-space="work">Работа</button>
      </div>
      <button class="icon-btn" data-action="menu" aria-label="Меню">•••</button>
    </header>

    <main id="workspaceWrap">
      <svg id="links" aria-hidden="true"></svg>
      <div id="workspace"></div>
      <div id="emptyState" class="empty-state hidden">
        <div class="empty-mark">≈</div>
        <h2>Пустое пространство</h2>
        <p>Создайте ядро: проект, цель, человека или идею.</p>
        <button class="primary" data-action="openCreate">Создать</button>
      </div>
    </main>

    <section id="todayPanel" class="sheet hidden">
      <div class="sheet-head"><h2>Сегодня</h2><button data-action="closeSheet">×</button></div>
      <div id="todayList"></div>
    </section>

    <section id="searchPanel" class="sheet hidden">
      <div class="sheet-head"><h2>Поиск</h2><button data-action="closeSheet">×</button></div>
      <input id="searchInput" class="search-input" placeholder="Человек, материал, проект, тег…">
      <div id="searchResults"></div>
    </section>

    <section id="inboxPanel" class="sheet hidden">
      <div class="sheet-head"><h2>Входящие</h2><button data-action="closeSheet">×</button></div>
      <textarea id="inboxText" placeholder="Мысль, ссылка, задача, заметка…"></textarea>
      <button class="primary" data-action="saveInbox">Сохранить во входящие</button>
      <div id="inboxList"></div>
    </section>

    <nav class="bottom-nav">
      <button data-action="today"><span>◷</span><small>Сегодня</small></button>
      <button data-action="search"><span>⌕</span><small>Поиск</small></button>
      <button class="add-main" data-action="openCreate"><span>＋</span></button>
      <button data-action="inbox"><span>↓</span><small>Входящие</small></button>
      <button data-action="fit"><span>◎</span><small>Обзор</small></button>
    </nav>

    <div id="createMenu" class="popover hidden">
      <button data-create="project">Проект</button>
      <button data-create="goal">Цель</button>
      <button data-create="person">Человек</button>
      <button data-create="idea">Идея</button>
      <button data-create="stage">Этап</button>
    </div>

    <div id="contextMenu" class="context-menu hidden"></div>

    <dialog id="editor">
      <form method="dialog" id="editorForm">
        <div class="dialog-head">
          <div>
            <small id="editorTypeLabel"></small>
            <h2 id="editorTitle">Карточка</h2>
          </div>
          <button value="cancel" class="icon-btn">×</button>
        </div>
        <div id="editorFields"></div>
        <div class="dialog-actions">
          <button type="button" class="ghost" data-action="deleteNode">Удалить</button>
          <button value="cancel" class="ghost">Отмена</button>
          <button value="default" class="primary" data-action="saveNode">Сохранить</button>
        </div>
      </form>
    </dialog>

    <dialog id="detail">
      <div class="dialog-head sticky">
        <div><small id="detailType"></small><h2 id="detailTitle"></h2></div>
        <button class="icon-btn" data-action="closeDetail">×</button>
      </div>
      <div id="detailBody"></div>
    </dialog>

    <input id="filePicker" type="file" multiple hidden>
  </div>
  <script src="app.js"></script>
</body>
</html>
