<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050816">
  <title>BOONWAVE Production Core</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/boonwave-logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/boonwave-logo.svg">
  <link rel="stylesheet" href="styles/boonwave-tokens.css">
  <link rel="stylesheet" href="styles/production-shell.css">
  <link rel="stylesheet" href="styles/production-shell-v2.css">
  <link rel="stylesheet" href="styles/card-detail-overrides.css">
  <link rel="stylesheet" href="styles/card-detail-v3.css">
  <link rel="stylesheet" href="styles/card-views.css">
  <link rel="stylesheet" href="styles/one-hand-rail-v3.css">
  <link rel="stylesheet" href="styles/contacts-screen.css">
  <link rel="stylesheet" href="styles/contact-editor.css">
  <link rel="stylesheet" href="styles/thumbnail-editor.css">
  <link rel="stylesheet" href="styles/relationship-controls.css">
  <style>
    .one-hand-rail .rail-home::before{content:none!important;display:none!important}
    .one-hand-rail .rail-home .bw-icon{display:block!important;width:23px;height:23px}
    .one-hand-rail .utility-button[aria-pressed="true"],.one-hand-rail .rail-button[aria-pressed="true"]{box-shadow:inset 0 0 0 1px rgba(var(--bw-brand-violet),.34),inset 0 0 18px rgba(var(--bw-brand-violet),.14)!important}
  </style>
</head>
<body>
  <svg width="0" height="0" aria-hidden="true" focusable="false"><defs><linearGradient id="bwIconGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#a14cff"/><stop offset="1" stop-color="#22bfff"/></linearGradient></defs></svg>

  <main class="app-shell">
    <header class="app-header"><img src="assets/boonwave-logo.svg" alt="BOONWAVE" class="app-logo app-logo--wordmark"></header>

    <aside class="one-hand-rail" id="utilityRail" data-position="right" aria-label="Управление одной рукой, справа">
      <button class="utility-button rail-home" id="homeSelfButton" type="button" aria-label="Вернуть рабочий стол в центр к Моей вселенной">
        <svg class="bw-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 4l5.4 5.4M9.4 9.4H5.8M9.4 9.4V5.8"/>
          <path d="M20 4l-5.4 5.4M14.6 9.4h3.6M14.6 9.4V5.8"/>
          <path d="M4 20l5.4-5.4M9.4 14.6H5.8M9.4 14.6v3.6"/>
          <path d="M20 20l-5.4-5.4M14.6 14.6h3.6M14.6 14.6v3.6"/>
        </svg>
      </button>

      <button class="rail-button rail-add" id="addCardButton" type="button" aria-label="Создать карточку">
        <svg class="bw-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 8v8M8 12h8"/></svg>
      </button>

      <button class="utility-button rail-contacts" id="contactsButton" type="button" aria-label="Открыть контакты" aria-expanded="false">
        <svg class="bw-icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="3"/><path d="M5 20a7 7 0 0 1 14 0"/></svg>
      </button>

      <div class="rail-zoom" id="zoomControl">
        <div class="zoom-touch-area" id="zoomTouchArea">
          <div class="zoom-visual" aria-hidden="true"><div class="zoom-fill"></div><div class="zoom-thumb"></div></div>
          <input id="zoomRange" class="zoom-accessible-range" type="range" min="0.14" max="1.5" step="0.005" value="0.85" aria-label="Масштаб рабочего пространства" aria-orientation="vertical">
        </div>
      </div>

      <button class="utility-button rail-lock" id="cardLockButton" type="button" aria-label="Зафиксировать расположение карточек" aria-pressed="false">
        <svg class="bw-icon lock-closed" viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="3"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/><path d="M12 14v2"/></svg>
        <svg class="bw-icon lock-open" viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="3"/><path d="M16 10V7a4 4 0 0 0-7.5-2"/><path d="M12 14v2"/></svg>
      </button>

      <button class="rail-button rail-more" id="moreToolsButton" type="button" aria-label="Дополнительные действия" aria-expanded="false" aria-controls="toolsSheet">
        <svg class="bw-icon" viewBox="0 0 24 24"><circle cx="6" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="18" cy="12" r="1.4"/></svg>
      </button>
    </aside>

    <section id="canvas" aria-label="Рабочее пространство BOONWAVE"><div id="world"></div></section>
    <div class="status-live" id="hint" role="status" aria-live="polite">Выбери карточку</div>
  </main>

  <section class="tools-sheet" id="toolsSheet" hidden aria-hidden="true">
    <div class="tools-panel" role="dialog" aria-modal="true" aria-labelledby="toolsTitle">
      <div class="tools-head"><h2 id="toolsTitle">Дополнительные действия</h2><button class="tools-close" id="closeToolsButton" type="button" aria-label="Закрыть дополнительные действия">×</button></div>
      <div class="tools-grid">
        <button class="tools-action" id="linkButton" type="button" aria-label="Связать или отвязать карточки" aria-pressed="false" data-close-tools-after-action><svg class="bw-icon" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.1.1l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1"/><path d="M14 11a5 5 0 0 0-7.1-.1l-2 2A5 5 0 0 0 12 20l1.1-1.1"/></svg><span>Связь</span></button>
        <button class="tools-action" id="archiveButton" type="button" aria-label="Переместить карточку в архив" data-close-tools-after-action><svg class="bw-icon" viewBox="0 0 24 24"><path d="M4 7h16v13H4zM3 4h18v3H3zM9 11h6"/></svg><span>В архив</span></button>
        <button class="tools-action" id="deleteButton" type="button" aria-label="Удалить выбранную карточку" data-close-tools-after-action><svg class="bw-icon" viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M7 7l1 13h8l1-13M10 11v5M14 11v5"/></svg><span>Удалить</span></button>
        <button class="tools-action" id="undoButton" type="button" aria-label="Отменить действие" disabled><svg class="bw-icon" viewBox="0 0 24 24"><path d="M16 7H9a5 5 0 0 0 0 10h6"/><path d="m12 4 4 3-4 3"/></svg><span>Отменить</span></button>
        <button class="tools-action" id="redoButton" type="button" aria-label="Повторить действие" disabled><svg class="bw-icon" viewBox="0 0 24 24"><path d="M8 7h7a5 5 0 0 1 0 10H9"/><path d="m12 4-4 3 4 3"/></svg><span>Повторить</span></button>
      </div>

      <div class="rail-position-section">
        <h3>Положение панели</h3>
        <div class="rail-position-grid" role="group" aria-label="Положение панели управления">
          <button class="rail-position-button" type="button" data-rail-position="left" aria-pressed="false"><span aria-hidden="true">←</span><span>Слева</span></button>
          <button class="rail-position-button" type="button" data-rail-position="right" aria-pressed="true"><span aria-hidden="true">→</span><span>Справа</span></button>
          <button class="rail-position-button" type="button" data-rail-position="bottom" aria-pressed="false"><span aria-hidden="true">↓</span><span>Снизу</span></button>
        </div>
      </div>
    </div>
  </section>

  <section class="sheet" id="createSheet" hidden>
    <form class="sheet-panel" id="createCardForm">
      <div class="sheet-head"><h2>Новая карточка</h2><button class="close-button" id="closeSheetButton" type="button" aria-label="Закрыть создание карточки">×</button></div>
      <div class="type-grid" id="typeGrid">
        <button class="type-button" type="button" data-node-type="project" aria-pressed="true">Проект</button>
        <button class="type-button" type="button" data-node-type="process" aria-pressed="false">Процесс</button>
        <button class="type-button" type="button" data-node-type="persona" aria-pressed="false">Персона</button>
        <button class="type-button" type="button" data-node-type="idea" aria-pressed="false">Идея</button>
        <button class="type-button" type="button" data-node-type="goal" aria-pressed="false">Цель</button>
      </div>
      <label class="field"><span>Название</span><input id="cardTitle" name="title" maxlength="80" required></label>
      <label class="field"><span>Описание</span><textarea id="cardDescription" name="description" maxlength="240"></textarea></label>
      <div class="typed-fields" id="createTypeFields"></div>
      <button class="submit-button" type="submit">Создать карточку</button>
    </form>
  </section>

  <section class="sheet" id="editSheet" hidden>
    <form class="sheet-panel" id="editCardForm">
      <div class="sheet-head"><h2>Редактирование</h2><button class="close-button" id="closeEditSheetButton" type="button" aria-label="Закрыть редактирование карточки">×</button></div>
      <label class="field"><span>Название</span><input id="editCardTitle" maxlength="80" required></label>
      <label class="field"><span>Описание</span><textarea id="editCardDescription" maxlength="240"></textarea></label>
      <div class="typed-fields" id="editTypeFields"></div>
      <button class="submit-button" type="submit">Сохранить изменения</button>
    </form>
  </section>

  <script type="module" src="app.js"></script>
</body>
</html>
