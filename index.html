<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#070913">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BOONWAVE">
  <title>BOONWAVE</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles/boonwave-tokens.css">
  <link rel="stylesheet" href="styles/production-shell.css">
</head>
<body>
  <svg width="0" height="0" aria-hidden="true" focusable="false"><defs><linearGradient id="bwIconGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#a14cff"/><stop offset="1" stop-color="#22bfff"/></linearGradient></defs></svg>
  <main class="app-shell">
    <header class="app-header"><div class="app-badge"><strong>BOONWAVE</strong><span>Production Core</span></div></header>
    <aside class="utility-rail" id="utilityRail" data-side="right" aria-label="Быстрые действия, справа">
      <button class="utility-button" id="homeSelfButton" type="button" aria-label="Вернуться к карточке Я Есмь" title="К себе. Удерживай, чтобы перенести панель">
        <svg class="bw-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="3"/><path d="M6 19c.6-3.2 2.6-5 6-5s5.4 1.8 6 5"/><path d="M4 12a8 8 0 0 1 16 0"/></svg>
      </button>
      <span class="utility-divider" aria-hidden="true"></span>
      <button class="utility-button" id="cardLockButton" type="button" aria-label="Зафиксировать расположение карточек" aria-pressed="false" title="Зафиксировать карточки. Удерживай, чтобы перенести панель">
        <svg class="bw-icon lock-closed" viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="10" width="14" height="10" rx="3"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/><path d="M12 14v2"/></svg>
        <svg class="bw-icon lock-open" viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="10" width="14" height="10" rx="3"/><path d="M16 10V7a4 4 0 0 0-7.5-2"/><path d="M12 14v2"/></svg>
      </button>
    </aside>
    <section id="canvas" aria-label="Рабочее пространство BOONWAVE"><div id="world"></div></section>
    <div class="status-live" id="hint" role="status" aria-live="polite">Выбери карточку</div>
    <nav class="mobile-dock" aria-label="Управление рабочим пространством">
      <div class="zoom-row">
        <button class="circle-button" id="editButton" type="button" aria-label="Редактировать карточку"><svg class="bw-icon" viewBox="0 0 24 24"><path d="M4 20h4l11-11-4-4L4 16v4Z"/><path d="m13.5 6.5 4 4"/></svg></button>
        <div class="zoom-control">
          <button class="zoom-step" id="zoomOutButton" type="button" aria-label="Уменьшить масштаб"><svg class="bw-icon" viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
          <input id="zoomRange" type="range" min="0.14" max="1.5" step="0.005" value="0.85" aria-label="Масштаб рабочего пространства">
          <button class="zoom-step" id="zoomInButton" type="button" aria-label="Увеличить масштаб"><svg class="bw-icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
        </div>
        <button class="circle-button" id="addCardButton" type="button" aria-label="Создать карточку"><svg class="bw-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 8v8M8 12h8"/></svg></button>
      </div>
      <div class="action-row">
        <div class="action-slot"><button class="action-button" id="linkButton" type="button" aria-label="Связать или отвязать карточки" aria-pressed="false"><svg class="bw-icon" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.1.1l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1"/><path d="M14 11a5 5 0 0 0-7.1-.1l-2 2A5 5 0 0 0 12 20l1.1-1.1"/></svg></button><span class="action-label">Связь</span></div>
        <div class="action-slot"><button class="action-button" id="deleteButton" type="button" aria-label="Удалить карточку"><svg class="bw-icon" viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M7 7l1 13h8l1-13M10 11v5M14 11v5"/></svg></button><span class="action-label">Удалить</span></div>
        <div class="action-slot"><button class="action-button" type="button" aria-label="Человек" disabled><svg class="bw-icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="3"/><path d="M5 20a7 7 0 0 1 14 0"/></svg></button><span class="action-label">Человек</span></div>
        <div class="action-slot"><button class="action-button" type="button" aria-label="Архив" disabled><svg class="bw-icon" viewBox="0 0 24 24"><path d="M4 7h16v13H4zM3 4h18v3H3zM9 11h6"/></svg></button><span class="action-label">Архив</span></div>
      </div>
    </nav>
  </main>

  <section class="sheet" id="createSheet" hidden>
    <form class="sheet-panel" id="createCardForm">
      <div class="sheet-head"><h2>Новая карточка</h2><button class="close-button" id="closeSheetButton" type="button" aria-label="Закрыть">×</button></div>
      <div class="type-grid" id="typeGrid">
        <button class="type-button" type="button" data-node-type="project" aria-pressed="true">Проект</button>
        <button class="type-button" type="button" data-node-type="process" aria-pressed="false">Процесс</button>
        <button class="type-button" type="button" data-node-type="person" aria-pressed="false">Человек</button>
        <button class="type-button" type="button" data-node-type="idea" aria-pressed="false">Идея</button>
        <button class="type-button" type="button" data-node-type="goal" aria-pressed="false">Цель</button>
      </div>
      <label class="field"><span>Название</span><input id="cardTitle" name="title" maxlength="80" autocomplete="off" required></label>
      <label class="field"><span>Описание</span><textarea id="cardDescription" name="description" maxlength="240"></textarea></label>
      <div class="typed-fields" id="createTypeFields"></div>
      <button class="submit-button" type="submit">Создать карточку</button>
    </form>
  </section>

  <section class="sheet" id="editSheet" hidden>
    <form class="sheet-panel" id="editCardForm">
      <div class="sheet-head"><h2>Редактирование</h2><button class="close-button" id="closeEditSheetButton" type="button" aria-label="Закрыть">×</button></div>
      <label class="field"><span>Название</span><input id="editCardTitle" maxlength="80" autocomplete="off" required></label>
      <label class="field"><span>Описание</span><textarea id="editCardDescription" maxlength="240"></textarea></label>
      <div class="typed-fields" id="editTypeFields"></div>
      <button class="submit-button" type="submit">Сохранить изменения</button>
    </form>
  </section>

  <script type="module" src="app.js"></script>
</body>
</html>
