<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#070913">
  <title>BOONWAVE Core Preview</title>
  <link rel="stylesheet" href="./styles/boonwave-tokens.css">
  <style>
    :root { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bw-bg-canvas); color: var(--bw-text-primary); overflow: hidden; }
    body { min-height: 100svh; }
    button, input, textarea, select { font: inherit; }
    .preview-shell { position: relative; min-height: 100svh; background: radial-gradient(circle at 50% -10%, rgba(var(--bw-brand-violet),.18), transparent 36%), var(--bw-bg-canvas); }
    .preview-header { position: fixed; inset: max(12px, env(safe-area-inset-top)) 14px auto; z-index: 20; pointer-events: none; }
    .preview-badge { padding: 9px 12px; border: 1px solid var(--bw-border-soft); border-radius: 15px; background: var(--bw-bg-control); backdrop-filter: blur(18px); box-shadow: var(--bw-shadow-control); }
    .preview-badge strong { display: block; font-size: 13px; letter-spacing: .08em; }
    .preview-badge span { display: block; margin-top: 2px; font-size: 10px; color: var(--bw-text-secondary); }
    #canvas { position: absolute; inset: 0; overflow: hidden; touch-action: none; }
    #world { position: absolute; inset: 0; transform-origin: 0 0; }
    .card { --node-rgb: var(--bw-type-project); position: absolute; width: 230px; min-height: 138px; padding: 18px; border-radius: var(--bw-radius-card); border: 1px solid rgba(var(--node-rgb), .42); background: linear-gradient(145deg, rgba(34,38,64,.92), var(--bw-bg-surface)); box-shadow: inset 0 0 0 1px rgba(var(--node-rgb), .10), 0 0 18px rgba(var(--node-rgb), .10), var(--bw-shadow-card), inset 0 1px 0 rgba(255,255,255,.06); z-index: 2; transition: border-color var(--bw-motion-fast) ease, box-shadow var(--bw-motion-fast) ease; }
    .card[data-node-type="project"] { --node-rgb: var(--bw-type-project); }
    .card[data-node-type="process"] { --node-rgb: var(--bw-type-process); }
    .card[data-node-type="person"] { --node-rgb: var(--bw-type-person); }
    .card[data-node-type="idea"] { --node-rgb: var(--bw-type-idea); }
    .card[data-node-type="goal"] { --node-rgb: var(--bw-type-goal); }
    .card[data-selected="true"] { border-color: rgba(var(--node-rgb), .90); box-shadow: inset 0 0 0 1px rgba(var(--node-rgb), .28), 0 0 0 1px rgba(var(--node-rgb), .28), 0 0 34px rgba(var(--node-rgb), var(--bw-glow-selected-alpha)), var(--bw-shadow-card), inset 0 1px 0 rgba(255,255,255,.08); }
    .card[data-link-source="true"]::after { content: "Источник"; position: absolute; top: -28px; left: 50%; transform: translateX(-50%); padding: 5px 9px; border-radius: 999px; background: #7766ff; color: white; font-size: 10px; white-space: nowrap; }
    .card-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .card-type { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--bw-text-muted); }
    .card-status { max-width: 96px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 10px; color: var(--bw-text-secondary); }
    .card h2 { margin: 10px 0 8px; font-size: 22px; line-height: 1.05; }
    .card p { margin: 0; color: var(--bw-text-secondary); font-size: 13px; line-height: 1.45; }
    .card-meta { margin-top: 11px; color: var(--bw-text-muted); font-size: 11px; min-height: 14px; }
    .hint { position: fixed; left: 50%; bottom: calc(max(12px, env(safe-area-inset-bottom)) + 138px); transform: translateX(-50%); z-index: 20; padding: 9px 13px; border-radius: 999px; background: var(--bw-bg-control); color: var(--bw-text-secondary); border: 1px solid var(--bw-border-soft); font-size: 11px; white-space: nowrap; backdrop-filter: blur(16px); pointer-events: none; max-width: calc(100vw - 40px); overflow: hidden; text-overflow: ellipsis; }
    .mobile-dock { position: fixed; left: 12px; right: 12px; bottom: max(10px, env(safe-area-inset-bottom)); z-index: 30; display: grid; gap: 10px; }
    .zoom-row { display: grid; grid-template-columns: 58px minmax(0,1fr) 58px; align-items: center; gap: 10px; }
    .bw-icon { width: 25px; height: 25px; fill: none; stroke: url(#bwIconGradient); stroke-width: var(--bw-control-stroke); stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
    .bw-icon.neutral { stroke: currentColor; }
    .dock-button, .action-button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; transition: transform var(--bw-motion-fast) ease, border-color var(--bw-motion-fast) ease, background var(--bw-motion-fast) ease, box-shadow var(--bw-motion-fast) ease; }
    .dock-button { display: grid; place-items: center; min-width: 52px; min-height: 52px; padding: 0; border: 1px solid var(--bw-border-medium); border-radius: 50%; background: var(--bw-bg-control); color: var(--bw-icon-base); box-shadow: var(--bw-shadow-control); backdrop-filter: blur(14px); }
    .dock-button.primary { background: var(--bw-control-gradient); color: white; }
    .dock-button.primary .bw-icon { stroke: currentColor; }
    .dock-button:active, .action-button:active { transform: scale(.96); }
    .zoom-control { display: grid; grid-template-columns: 28px minmax(0,1fr) 28px; align-items: center; gap: 8px; min-height: 56px; padding: 0 12px; border: 1px solid var(--bw-border-soft); border-radius: 28px; background: var(--bw-bg-control); box-shadow: var(--bw-shadow-control); backdrop-filter: blur(16px); }
    .zoom-step { display: grid; place-items: center; min-width: 28px; min-height: 44px; border: 0; background: transparent; color: var(--bw-icon-base); padding: 0; }
    .zoom-step .bw-icon { width: 18px; height: 18px; stroke: currentColor; }
    #zoomRange { width: 100%; accent-color: rgb(var(--bw-brand-cyan)); }
    .action-row { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 8px; padding: 10px; border: 1px solid var(--bw-border-soft); border-radius: 24px; background: var(--bw-bg-control); box-shadow: var(--bw-shadow-control); backdrop-filter: blur(16px); }
    .action-button { display: grid; justify-items: center; align-content: center; min-height: 56px; padding: 6px 4px; border: 1px solid transparent; border-radius: 16px; background: transparent; color: var(--bw-icon-base); }
    .action-button span { display: block; margin-top: 5px; color: var(--bw-text-secondary); font-size: 9px; line-height: 1.1; }
    .action-button.danger .bw-icon { stroke: url(#bwDangerGradient); }
    .action-button[aria-pressed="true"] { border-color: rgba(var(--bw-brand-violet),.30); background: var(--bw-bg-control-active); box-shadow: inset 0 0 18px rgba(var(--bw-brand-violet),.14); }
    .action-button[disabled] { opacity: .38; }
    .sheet[hidden] { display: none; }
    .sheet { position: fixed; inset: 0; z-index: 50; display: grid; align-items: end; background: rgba(3,4,10,.56); backdrop-filter: blur(8px); }
    .sheet-panel { max-height: min(82svh, 760px); overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 18px 18px calc(18px + env(safe-area-inset-bottom)); border-radius: 28px 28px 0 0; border: 1px solid var(--bw-border-soft); background: var(--bw-bg-surface-strong); box-shadow: 0 -20px 60px rgba(0,0,0,.44); }
    .sheet-head { position: sticky; top: -18px; z-index: 2; display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: -18px -18px 14px; padding: 18px; background: linear-gradient(180deg, var(--bw-bg-surface-strong) 75%, transparent); }
    .sheet-head h2 { margin: 0; font-size: 20px; }
    .close-button { min-width: 44px; min-height: 44px; border: 0; background: transparent; color: var(--bw-text-secondary); font-size: 24px; }
    .type-grid { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 8px; margin-bottom: 12px; }
    .type-button { min-height: 54px; padding: 8px 5px; border-radius: 14px; border: 1px solid var(--bw-border-soft); background: var(--bw-bg-control); color: var(--bw-text-secondary); font-size: 11px; }
    .type-button[aria-pressed="true"] { border-color: rgba(var(--bw-brand-violet),.85); color: var(--bw-text-primary); box-shadow: 0 0 20px rgba(var(--bw-brand-violet),.25); }
    .typed-fields { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
    .field { display: block; margin-top: 10px; }
    .typed-fields .field { margin-top: 0; }
    .field span { display: block; margin-bottom: 6px; font-size: 12px; color: var(--bw-text-muted); }
    .field input, .field textarea, .field select { width: 100%; min-height: 44px; border: 1px solid var(--bw-border-soft); border-radius: 14px; background: var(--bw-bg-control); color: var(--bw-text-primary); padding: 12px 14px; outline: none; }
    .field input:focus-visible, .field textarea:focus-visible, .field select:focus-visible, button:focus-visible { outline: 2px solid rgba(var(--bw-brand-cyan),.90); outline-offset: 2px; }
    .field textarea { min-height: 74px; resize: none; }
    .submit-button { width: 100%; min-height: 48px; margin-top: 14px; padding: 14px; border: 0; border-radius: 16px; background: linear-gradient(135deg, rgb(var(--bw-brand-violet)), rgb(var(--bw-brand-blue))); color: white; font-weight: 700; }
    @media (prefers-color-scheme: light) { .preview-shell { background: radial-gradient(circle at 50% -10%, rgba(var(--bw-brand-magenta),.12), transparent 38%), var(--bw-bg-canvas); } .card { background: linear-gradient(145deg, rgba(255,255,255,.98), var(--bw-bg-surface)); } .sheet { background: rgba(23,29,50,.20); } }
    @media (max-width: 390px) { .typed-fields { grid-template-columns: 1fr; } .action-button span { display: none; } }
  </style>
</head>
<body>
  <svg width="0" height="0" aria-hidden="true" focusable="false">
    <defs>
      <linearGradient id="bwIconGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#a14cff"/><stop offset="1" stop-color="#22bfff"/></linearGradient>
      <linearGradient id="bwDangerGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff5f8f"/><stop offset="1" stop-color="#ffad7a"/></linearGradient>
    </defs>
  </svg>
  <main class="preview-shell">
    <header class="preview-header"><div class="preview-badge"><strong>BOONWAVE</strong><span>Core Stage G · Adaptive Controls</span></div></header>
    <section id="canvas" aria-label="Тестовый холст BOONWAVE"><div id="world"></div></section>
    <div class="hint" id="hint">Выбери карточку • редактировать • удалить</div>
    <nav class="mobile-dock" aria-label="Управление рабочим пространством">
      <div class="zoom-row">
        <button class="dock-button" id="editButton" type="button" aria-label="Редактировать карточку"><svg class="bw-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h4l11-11-4-4L4 16v4Z"/><path d="m13.5 6.5 4 4"/></svg></button>
        <div class="zoom-control">
          <button class="zoom-step" id="zoomOutButton" type="button" aria-label="Уменьшить масштаб"><svg class="bw-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/></svg></button>
          <input id="zoomRange" type="range" min="0.25" max="3" step="0.01" value="1" aria-label="Масштаб рабочего пространства">
          <button class="zoom-step" id="zoomInButton" type="button" aria-label="Увеличить масштаб"><svg class="bw-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg></button>
        </div>
        <button class="dock-button primary" id="addCardButton" type="button" aria-label="Создать карточку"><svg class="bw-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg></button>
      </div>
      <div class="action-row">
        <button class="action-button" id="connectButton" type="button" aria-label="Создать связь" aria-pressed="false"><svg class="bw-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.1.1l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1"/><path d="M14 11a5 5 0 0 0-7.1-.1l-2 2A5 5 0 0 0 12 20l1.1-1.1"/></svg><span>Связать</span></button>
        <button class="action-button" id="disconnectButton" type="button" aria-label="Удалить связь" aria-pressed="false"><svg class="bw-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m8 8 8 8M16 8l-8 8"/><path d="M10 13a5 5 0 0 0 7.1.1l2-2"/><path d="m4.9 12.9 2-2A5 5 0 0 1 12 9.7"/></svg><span>Разорвать</span></button>
        <button class="action-button danger" id="deleteButton" type="button" aria-label="Удалить карточку"><svg class="bw-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M9 7V4h6v3M7 7l1 13h8l1-13M10 11v5M14 11v5"/></svg><span>Удалить</span></button>
        <button class="action-button" type="button" aria-label="Человек" disabled><svg class="bw-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="3"/><path d="M5 20a7 7 0 0 1 14 0"/></svg><span>Человек</span></button>
        <button class="action-button" type="button" aria-label="Архив" disabled><svg class="bw-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16v13H4zM3 4h18v3H3zM9 11h6"/></svg><span>Архив</span></button>
      </div>
    </nav>
  </main>
  <section class="sheet" id="createSheet" hidden>
    <form class="sheet-panel" id="createCardForm">
      <div class="sheet-head"><h2>Новая карточка</h2><button class="close-button" id="closeSheetButton" type="button" aria-label="Закрыть">×</button></div>
      <div class="type-grid" id="typeGrid">
        <button class="type-button" type="button" data-node-type="project" aria-pressed="true">Проект</button>
        <button class="type-button" type="button" data-node-type="process" aria-pressed="false">Процесс</button>
        <button class="type-button" type="button" data-node-type="person" aria-pressed="false">Человек</button>
        <button class="type-button" type="button" data-node-type="idea" aria-pressed="false">Идея</button>
        <button class="type-button" type="button" data-node-type="goal" aria-pressed="false">Цель</button>
      </div>
      <label class="field"><span>Название</span><input id="cardTitle" name="title" maxlength="80" autocomplete="off" required></label>
      <label class="field"><span>Описание</span><textarea id="cardDescription" name="description" maxlength="240"></textarea></label>
      <div class="typed-fields" id="createTypeFields"></div>
      <button class="submit-button" type="submit">Создать карточку</button>
    </form>
  </section>
  <section class="sheet" id="editSheet" hidden>
    <form class="sheet-panel" id="editCardForm">
      <div class="sheet-head"><h2>Редактирование</h2><button class="close-button" id="closeEditSheetButton" type="button" aria-label="Закрыть">×</button></div>
      <label class="field"><span>Название</span><input id="editCardTitle" maxlength="80" autocomplete="off" required></label>
      <label class="field"><span>Описание</span><textarea id="editCardDescription" maxlength="240"></textarea></label>
      <div class="typed-fields" id="editTypeFields"></div>
      <button class="submit-button" type="submit">Сохранить изменения</button>
    </form>
  </section>
  <script type="module" src="./preview.js"></script>
</body>
</html>
